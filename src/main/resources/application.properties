# =========================================================
# IDENTIFICACAO DA APLICACAO
# =========================================================

# Define o nome da aplicacao no ecossistema Spring.
# Esse nome pode aparecer em logs, monitoramento e ferramentas do Spring.
spring.application.name=biblioteca


# =========================================================
# CONFIGURACAO DO BANCO H2
# =========================================================

# Define a URL de conexao com o banco H2 em memoria.
# "mem:biblioteca" significa:
# - o banco existe apenas enquanto a aplicacao estiver rodando
# - ao encerrar a aplicacao, os dados somem
# Isso e otimo para estudo e testes rapidos.
spring.datasource.url=jdbc:h2:mem:biblioteca

# Usuario padrao para acessar o banco H2.
spring.datasource.username=sa

# Senha do banco H2.
# No modo de estudo, geralmente deixamos vazia.
spring.datasource.password=

# Driver JDBC usado pelo Spring para conversar com o H2.
spring.datasource.driver-class-name=org.h2.Driver


# =========================================================
# H2 CONSOLE
# =========================================================

# Habilita o console web do H2.
# Isso permite abrir o banco pelo navegador e executar SQL manualmente.
spring.h2.console.enabled=true

# Define o caminho do console H2.
# Quando a aplicacao estiver rodando, o acesso costuma ficar em:
# http://localhost:8080/h2-console
spring.h2.console.path=/h2-console

# Permite acesso ao console H2 a partir de hosts remotos.
# Em ambiente real, isso normalmente deve ficar desabilitado por seguranca.
# Para estudo local, geralmente nao e necessario alterar.
# spring.h2.console.settings.web-allow-others=true

# Evita que o H2 feche o banco em memoria quando a ultima conexao for encerrada.
# Isso pode ser util em alguns cenarios de teste ou ferramentas.
# Nao e obrigatorio para este projeto agora.
# spring.datasource.url=jdbc:h2:mem:biblioteca;DB_CLOSE_DELAY=-1


# =========================================================
# JPA / HIBERNATE
# =========================================================

# Define como o Hibernate deve tratar as tabelas do banco.
# update:
# - cria tabelas que nao existem
# - atualiza a estrutura quando possivel
# - preserva dados existentes
#
# Outros valores importantes:
# create:
# - apaga e recria tudo ao iniciar
#
# create-drop:
# - cria ao iniciar e apaga ao encerrar
#
# validate:
# - apenas valida se a estrutura do banco bate com as entidades
#
# none:
# - nao faz alteracoes automaticas
spring.jpa.hibernate.ddl-auto=update

# Mostra no console os comandos SQL gerados pelo Hibernate.
# Isso ajuda muito no aprendizado, porque voce enxerga o que o JPA esta fazendo.
spring.jpa.show-sql=true

# Deixa o SQL impresso de forma mais organizada e legivel.
spring.jpa.properties.hibernate.format_sql=true

# Define explicitamente o dialeto do banco.
# Em muitas versoes/configuracoes o Spring consegue detectar sozinho,
# mas declarar isso deixa mais claro o banco alvo para estudo.
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Mostra comentarios extras no SQL gerado pelo Hibernate.
# Pode ajudar a entender a origem de algumas operacoes.
# spring.jpa.properties.hibernate.use_sql_comments=true

# Controla se a inicializacao JPA deve ocorrer de forma adiada.
# Isso pode ser util em cenarios mais avancados de inicializacao.
# spring.jpa.defer-datasource-initialization=true


# =========================================================
# LOGS IMPORTANTES PARA APRENDIZADO
# =========================================================

# Mostra detalhes do SQL executado pelo Hibernate.
# Bom para entender o que esta indo para o banco.
logging.level.org.hibernate.SQL=DEBUG

# Mostra os valores dos parametros passados ao SQL.
# Isso ajuda a enxergar os dados reais enviados nas consultas.
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# Em algumas versoes mais antigas do Hibernate/Spring,
# o pacote abaixo era usado para ver parametros bindados:
# logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE


# =========================================================
# PROPRIEDADES OPCIONAIS UTEIS PARA CONHECER
# =========================================================

# Define uma porta diferente para a aplicacao.
# Se voce descomentar, a API deixara de usar a porta 8080.
# server.port=8081

# Define contexto base da aplicacao.
# Se voce descomentar, os endpoints ficariam sob /api, por exemplo:
# http://localhost:8080/api/livros
# server.servlet.context-path=/api

# Inicializa scripts SQL automaticamente, se existirem arquivos como:
# - schema.sql
# - data.sql
# spring.sql.init.mode=always

# Mantem o banco H2 ativo mesmo com multiplas conexoes locais.
# E uma variacao comum de URL para estudo:
# spring.datasource.url=jdbc:h2:mem:biblioteca;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
